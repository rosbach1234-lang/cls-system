const fmtCard=v=>v.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim();
const fmtExp=v=>{const d=v.replace(/\D/g,"").slice(0,4);return d.length>2?d.slice(0,2)+"/"+d.slice(2):d;};
const luhn=n=>{const d=n.replace(/\s/g,"");let s=0,a=false;for(let i=d.length-1;i>=0;i--){let x=+d[i];if(a){x*=2;if(x>9)x-=9;}s+=x;a=!a;}return s%10===0&&d.length>=13;};
const detectCard=n=>{const d=n.replace(/\s/g,"");if(/^4/.test(d))return{t:"VISA",c:"#1A1F71"};if(/^5[1-5]/.test(d))return{t:"MC",c:"#EB001B"};if(/^3[47]/.test(d))return{t:"AMEX",c:"#2E77BC"};return{t:"",c:"#555"};};
const addMonths=(d,m)=>{const r=new Date(d);r.setMonth(r.getMonth()+m);return r;};
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};

const callAI=async msgs=>{
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:"Du bist ein Experte für Aviation Ground Handling Training (CLS). Beantworte Fragen zu Rampensicherheit, Gefahrgut, Passagierhandling und SMS. Antworte in der Sprache des Users. Sei präzise und beziehe dich auf IATA, ICAO und EASA Standards.",
        messages:msgs})});
    const d=await res.json();
    return d.content?.map(b=>b.text||"").join("")||"Fehler.";
  }catch{return"Verbindungsfehler.";}
};

                    <div style={{height:175,borderRadius:14,padding:"20px 22px",background:`linear-gradient(135deg,${th.ac}22,${th.ac}55)`,border:`1px solid ${th.ac}44`,position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",top:0,right:0,width:140,height:140,borderRadius:"50%",background:`${th.ac}11`,transform:"translate(40%,-40%)"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:22}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:900,letterSpacing:3,opacity:.8}}>CLS</span><span>💳</span></div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:"clamp(14px,4vw,20px)",fontWeight:700,letterSpacing:3,marginBottom:16,opacity:.9}}>{card.n||"•••• •••• •••• ••••"}</div>

                    <div><label style={S.lbl}>KARTENINHABER</label><input style={S.inp} placeholder="MAX MUSTERMANN" value={card.h} onChange={e=>setCard({...card,h:e.target.value.toUpperCase()})}/></div>
                    <div style={{display:"flex",gap:11}}>
                      <div style={{flex:1}}><label style={S.lbl}>ABLAUFDATUM</label><input style={S.inp} placeholder="MM/YY" value={card.e} onChange={e=>setCard({...card,e:fmtExp(e.target.value)})}/></div>
                      <div style={{flex:1}}><label style={S.lbl}>CVV</label><input style={S.inp} placeholder="•••" type="password" maxLength={4} value={card.v} onChange={e=>setCard({...card,v:e.target.value.replace(/\D/g,"").slice(0,4)})}/></div>
                    </div>
                    <div><label style={S.lbl}>GUTSCHEIN</label>
                      <div style={{display:"flex",gap:7}}><input style={{...S.inp,flex:1}} placeholder="CLS10" value={card.coup} onChange={e=>setCard({...card,coup:e.target.value})}/><button style={{...S.gh,whiteSpace:"nowrap"}}>Anwenden</button></div></div>
                    {disc>0&&<div style={{background:"#0A2A1A",border:"1px solid #36B37E",borderRadius:8,padding:"7px 13px",color:"#36B37E",fontSize:12}}>🎉 10% Rabatt aktiv — Sie sparen €{disc}</div>}
                    {cErr&&<div style={{background:"#2A0A0A",border:"1px solid #E53935",borderRadius:8,padding:"9px 13px",color:"#EF5350",fontSize:12}}>⚠ {cErr}</div>}
                    <button style={{...S.btn(),padding:13,fontSize:15,borderRadius:10,opacity:paying?.7:1}} onClick={doPay} disabled={paying}>{paying?"⏳ Verarbeitung...":` 🔒 Jetzt bezahlen — €${fin}`}</button>
                    <div style={{color:th.sub,fontSize:10,textAlign:"center"}}>🔒 256-Bit SSL · Ihre Daten sind sicher</div>
                  </div>
                ):(

                    <div style={{color:"#FFF",fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,marginBottom:7}}>🅿 PayPal</div>
                    <div style={{color:"rgba(255,255,255,.7)",fontSize:13,marginBottom:20}}>Sicher über PayPal bezahlen</div>
                    <button style={{background:"#FFD140",color:"#111",border:"none",borderRadius:9,padding:"12px 36px",fontWeight:800,cursor:"pointer",fontSize:14,width:"100%"}} onClick={doPay}>{paying?"⏳ Verarbeitung...":` Jetzt bezahlen — €${fin}`}</button>
                  </div>

              <div style={{flex:"0 0 240px",minWidth:200}}>
                <div style={{...S.cd,position:"sticky",top:105}}>

                  {activeMod&&<div style={{display:"flex",gap:9,marginBottom:13,paddingBottom:13,borderBottom:`1px solid ${th.bdr}`}}><span style={{fontSize:22}}>{activeMod.icon}</span><div><div style={{fontWeight:700,fontSize:12}}>{activeMod.title}</div><div style={{color:th.sub,fontSize:10}}>{activeMod.code}</div></div></div>}
                  {selSub&&<><div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${th.bdr}`,fontSize:12}}><span style={{color:th.sub}}>Plan</span><span style={{fontWeight:600}}>{SUB_NAMES[selSub.key]}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${th.bdr}`,fontSize:12}}><span style={{color:th.sub}}>Laufzeit</span><span style={{fontWeight:600}}>{selSub.months} Monate</span></div>
                  {disc>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${th.bdr}`,fontSize:12}}><span style={{color:"#36B37E"}}>Rabatt</span><span style={{color:"#36B37E",fontWeight:700}}>-€{disc}</span></div>}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0",fontSize:15,fontWeight:800}}><span>Total</span><span style={{color:th.ac}}>€{fin}</span></div>
                  <div style={{background:th.acl,borderRadius:8,padding:"9px 11px",fontSize:11,color:th.sub}}>⚡ {selSub.cancel}</div></>}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // CANCEL
  if(view==="cancel"&&cancelTarget){
    const effDate=cancelTarget.noticeDays>0?addDays(new Date(),cancelTarget.noticeDays):new Date(cancelTarget.end);
    return(
      <div style={S.app}><Hdr/>
        <div style={{...S.pg,maxWidth:560}}>
          <button style={{...S.gh,marginBottom:18,fontSize:12}} onClick={()=>nav("profile")}>← Zurück</button>
          <div style={{...S.cd,borderTop:"3px solid #E53935",padding:28}}>
            <div style={{fontSize:40,marginBottom:13}}>⚠</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:7}}>Kündigung bestätigen</div>
            <div style={{...S.cd,background:th.acl,marginBottom:18}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{cancelTarget.mname}</div>
              <div style={{color:th.sub,fontSize:12,lineHeight:1.7}}>Kündigung wirksam ab <strong>{fmtDate(effDate)}</strong>. Zugang bleibt bis dahin erhalten.</div>
              {cancelTarget.noticeDays>0&&<div style={{marginTop:9,padding:"7px 11px",background:isCEO?"#FFF8F0":"#1A0A00",borderRadius:7,fontSize:11,color:"#F0A03B"}}>⏰ {cancelTarget.noticeDays} Tage Kündigungsfrist</div>}
            </div>
            <div style={{display:"flex",gap:11}}>
              <button style={{...S.btn("#E53935"),flex:1,padding:12,fontSize:13}} onClick={()=>{setSubs(p=>p.map(s=>s.id===cancelTarget.id?{...s,status:"cancelled",cancelledAt:new Date().toISOString(),effEnd:effDate.toISOString()}:s));setCancelTarget(null);nav("profile");}}>🗑 Ja, kündigen</button>
              <button style={{...S.gh,flex:1,padding:12,fontSize:13}} onClick={()=>nav("profile")}>💚 Behalten</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // QUIZ
  if(view==="quiz"){
    const ulMods=MODS.filter(m=>isUnlocked(m.id)).map(m=>m.id);
    const pool=ulMods.length>0?QS.filter(q=>ulMods.includes(q.mod)):QS;
    const wrongIds=(mem[user?.email]?.h||[]).filter(x=>!x.ok).map(x=>x.id);
    const weakT=getWeak();
    const sorted=[...pool.filter(q=>wrongIds.includes(q.id)),...pool.filter(q=>!wrongIds.includes(q.id)&&weakT.includes(q.top)),...pool.filter(q=>!wrongIds.includes(q.id)&&!weakT.includes(q.top))];
    const allQs=[...new Map(sorted.map(q=>[q.id,q])).values()];
    if(!allQs.length)return<div style={S.app}><Hdr/><div style={{...S.pg,textAlign:"center",paddingTop:70,color:th.sub}}><div style={{fontSize:44}}>📚</div><div style={{marginTop:14}}>Bitte erst ein Modul abonnieren.</div><button style={{...S.btn(),marginTop:16}} onClick={()=>nav("dash")}>Zu den Modulen</button></div></div>;
    const idx=Math.min(qstate.idx,allQs.length-1);
    const q=allQs[idx];
    const isWrong=wrongIds.includes(q.id);
    return(
      <div style={S.app}><Hdr/>
        <div style={{...S.pg,maxWidth:680}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={S.H2}>ADAPTIVES QUIZ</div><div style={{color:th.sub,fontSize:12}}>{idx+1}/{allQs.length}</div></div>
          {isWrong&&<div style={{background:isCEO?"#FFF8F0":"#1A1200",border:"1px solid #F0A03B",borderRadius:8,padding:"7px 13px",marginBottom:13,fontSize:11,color:"#F0A03B"}}>⚠ Wiederholungsfrage — zuvor falsch beantwortet.</div>}
          <div style={{display:"flex",gap:3,marginBottom:20}}>{allQs.slice(0,Math.min(allQs.length,20)).map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,cursor:"pointer",background:i<idx?"#36B37E":i===idx?th.ac:th.bdr}} onClick={()=>setQstate({idx:i,ans:null})}/>)}</div>
          <div style={{...S.cd,marginBottom:13}}>
            <div style={{display:"flex",gap:7,marginBottom:11}}>
              <span style={{background:th.acl,color:th.ac,fontSize:9,fontWeight:800,padding:"2px 9px",borderRadius:20}}>{q.top.toUpperCase()}</span>
              <span style={{background:th.bdr,color:th.sub,fontSize:9,fontWeight:800,padding:"2px 9px",borderRadius:20}}>{"⭐".repeat(q.dif)}</span>
            </div>
            <div style={{fontWeight:600,fontSize:15,lineHeight:1.65,marginBottom:20}}>{q.q}</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {q.o.map((opt,i)=>{
                let bg=th.acl,bdr=th.bdr,col=th.txt;
                if(qstate.ans!==null){if(i===q.c){bg=isCEO?"#F0FFF4":"#0A2A1A";bdr="#36B37E";col="#36B37E";}else if(i===qstate.ans){bg=isCEO?"#FFF0F0":"#2A0A0A";bdr="#E53935";col="#E53935";}else col=th.sub;}
                return<div key={i} style={{background:bg,border:`1.5px solid ${bdr}`,borderRadius:9,padding:"11px 15px",cursor:qstate.ans===null?"pointer":"default",color:col,fontSize:13,display:"flex",alignItems:"center",gap:9,transition:"all .15s"}}
                  onClick={()=>{if(qstate.ans===null){const ok=i===q.c;setQstate(s=>({...s,ans:i}));recordAns(q.id,ok);}}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,minWidth:18,color:th.sub}}>{["A","B","C","D"][i]}</span>
                  <span style={{flex:1}}>{opt}</span>
                  {qstate.ans!==null&&i===q.c&&<span>✓</span>}
                  {qstate.ans!==null&&i===qstate.ans&&i!==q.c&&<span>✗</span>}
                </div>;
              })}
            </div>
            {qstate.ans!==null&&<div style={{marginTop:16,background:th.acl,borderLeft:`3px solid ${th.ac}`,borderRadius:7,padding:"12px 14px"}}><div style={{color:th.ac,fontSize:9,fontWeight:800,letterSpacing:2,marginBottom:6}}>ERKLÄRUNG</div><div style={{fontSize:12,lineHeight:1.8}}>{q.e}</div></div>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <button style={S.gh} disabled={idx===0} onClick={()=>setQstate(s=>({...s,idx:s.idx-1,ans:null}))}>← Zurück</button>
            <button style={S.btn()} disabled={idx>=allQs.length-1} onClick={()=>setQstate(s=>({...s,idx:s.idx+1,ans:null}))}>Weiter →</button>
          </div>
        </div>
      </div>
    );
  }

  // EXAM SELECT
  if(view==="exam-sel"){
    const ulMods=MODS.filter(m=>isUnlocked(m.id));
    return(
      <div style={S.app}><Hdr/>
        <div style={{...S.pg,maxWidth:680}}>
          <div style={S.H2}>PRÜFUNGSMODUS</div>
          <div style={{...S.cd,marginBottom:18,borderLeft:`3px solid ${th.ac}`,fontSize:12,color:th.sub,lineHeight:1.8}}>20 Fragen · 45 Minuten · 80% zum Bestehen · Zertifikat bei Erfolg</div>
          {!ulMods.length?<div style={{...S.cd,textAlign:"center",padding:36}}><div style={{fontSize:40,marginBottom:13}}>🔒</div><button style={{...S.btn(),marginTop:14}} onClick={()=>nav("dash")}>Zu den Modulen</button></div>:(
            <div style={{display:"flex",flexDirection:"column",gap:11}}>
              {ulMods.map(mod=>{
                const pool=QS.filter(q=>q.mod===mod.id);
                return<div key={mod.id} style={{...S.cd,display:"flex",alignItems:"center",gap:14}}>
                  <span style={{fontSize:26}}>{mod.icon}</span>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{mod.title}</div><div style={{color:th.sub,fontSize:11}}>{mod.code} · {pool.length} Fragen</div></div>
                  <button style={{...S.btn(),fontSize:12,padding:"7px 14px"}} onClick={()=>{
                    const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(20,pool.length));
                    setExamState({mid:mod.id,mname:mod.title,qs:shuffled,cur:0,ans:{},start:Date.now(),limit:45*60,done:false,passed:false,score:0});nav("exam");
                  }}>📝 Prüfung starten</button>
                </div>;
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // EXAM
  if(view==="exam"&&examState){
    const ExV=()=>{
      const[tl,setTl]=useState(examState.limit-Math.floor((Date.now()-examState.start)/1000));
      const[la,setLa]=useState(examState.ans||{});
      const[cur,setCur]=useState(examState.cur||0);
      const[done,setDone]=useState(examState.done);
      const[res,setRes]=useState(null);
      useEffect(()=>{if(done)return;const i=setInterval(()=>setTl(p=>{if(p<=1){clearInterval(i);doSubmit();return 0;}return p-1;}),1000);return()=>clearInterval(i);},[done]);
      const doSubmit=()=>{const correct=examState.qs.filter(q=>la[q.id]===q.c).length;const score=Math.round(correct/examState.qs.length*100);const passed=score>=80;setRes({score,correct,total:examState.qs.length,passed});setDone(true);examState.qs.forEach(q=>recordAns(q.id,la[q.id]===q.c));if(passed){const mod=MODS.find(m=>m.id===examState.mid);if(mod)setCertMod(mod);}};
      const q=examState.qs[cur];
      const mm=String(Math.floor(tl/60)).padStart(2,"0");
      const ss=String(tl%60).padStart(2,"0");
      if(done&&res)return(
        <div style={{...S.pg,maxWidth:560,textAlign:"center"}}>
          <div style={{fontSize:60,marginBottom:16}}>{res.passed?"🏆":"📚"}</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:38,fontWeight:900,color:res.passed?"#36B37E":"#E53935",marginBottom:9}}>{res.passed?"Bestanden!":"Nicht bestanden"}</div>
          <div style={{display:"flex",justifyContent:"center",gap:18,marginBottom:28,flexWrap:"wrap"}}>
            {[{l:"Ergebnis",v:`${res.score}%`,c:res.passed?"#36B37E":"#E53935"},{l:"Mindest",v:"80%",c:th.ac},{l:"Richtig",v:`${res.correct}/${res.total}`,c:th.txt}].map(r=>(
              <div key={r.l} style={{...S.cd,textAlign:"center",padding:"14px 20px"}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,color:r.c}}>{r.v}</div><div style={{color:th.sub,fontSize:10,fontWeight:700}}>{r.l.toUpperCase()}</div></div>
            ))}
          </div>
          <div style={{display:"flex",gap:11,justifyContent:"center",flexWrap:"wrap"}}>
            {res.passed&&<button style={{...S.btn("#36B37E"),padding:"11px 22px",fontSize:13}} onClick={()=>nav("cert")}>📜 Zertifikat</button>}
            <button style={S.btn()} onClick={()=>{setExamState(null);nav("exam-sel");}}>🔄 Wiederholen</button>
            <button style={S.gh} onClick={()=>nav("dash")}>Dashboard</button>
          </div>
        </div>
      );
      return(
        <div style={{...S.pg,maxWidth:680}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:9}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900}}>{examState.mname}</div>
            <div style={{background:tl<120?"#E53935":th.acl,color:tl<120?"#FFF":th.ac,padding:"7px 14px",borderRadius:8,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:19,letterSpacing:2}}>⏱ {mm}:{ss}</div>
          </div>
          <div style={{display:"flex",gap:3,marginBottom:18,flexWrap:"wrap"}}>{examState.qs.map((_,i)=><div key={i} style={{width:17,height:17,borderRadius:3,background:i===cur?th.ac:la[examState.qs[i]?.id]!==undefined?"#36B37E":th.bdr,cursor:"pointer"}} onClick={()=>setCur(i)}/>)}</div>
          <div style={{...S.cd,marginBottom:13}}>
            <div style={{color:th.sub,fontSize:10,fontWeight:800,letterSpacing:2,marginBottom:11}}>FRAGE {cur+1} / {examState.qs.length}</div>
            <div style={{fontWeight:600,fontSize:15,lineHeight:1.65,marginBottom:19}}>{q.q}</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {q.o.map((opt,i)=>{const sel=la[q.id]===i;return<div key={i} style={{background:sel?th.acl:th.sur,border:`1.5px solid ${sel?th.ac:th.bdr}`,borderRadius:9,padding:"11px 15px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:9,transition:"all .15s"}}
                onClick={()=>setLa(p=>({...p,[q.id]:i}))}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,minWidth:18,color:sel?th.ac:th.sub}}>{["A","B","C","D"][i]}</span>
                <span style={{flex:1,color:sel?th.ac:th.txt}}>{opt}</span>{sel&&<span>✓</span>}
              </div>;})}
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <button style={S.gh} disabled={cur===0} onClick={()=>setCur(p=>p-1)}>← Zurück</button>
            {cur<examState.qs.length-1?<button style={S.btn()} onClick={()=>setCur(p=>p+1)}>Weiter →</button>:<button style={{...S.btn("#36B37E"),padding:"9px 22px"}} onClick={doSubmit}>✅ Abgeben</button>}
          </div>
        </div>
      );
    };
    return<div style={S.app}><Hdr/><ExV/></div>;
  }

  // SIMULATION
  if(view==="sim"){
    const sc=SCENARIOS[simState.sc];
    const step=sc.steps[simState.st];
    const done=simState.st>=sc.steps.length;
    return(
      <div style={S.app}><Hdr/>
        <div style={{...S.pg,maxWidth:700}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:11}}>
            <div style={S.H2}>INCIDENT SIMULATION</div>
            <div style={{display:"flex",gap:7}}>{SCENARIOS.map((s,i)=><button key={i} style={{...S.lkb(simState.sc===i),padding:"5px 11px",borderRadius:8}} onClick={()=>setSimState({sc:i,st:0,dec:null,score:0,done:false})}>{s.icon} {s.title}</button>)}</div>
          </div>
          <div style={{...S.cd,marginBottom:14,borderLeft:`3px solid ${th.ac}`}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{sc.icon} {sc.title}</div>
            <div style={{display:"flex",gap:5,marginTop:10}}>{sc.steps.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<simState.st?"#36B37E":i===simState.st?th.ac:th.bdr}}/>)}</div>
          </div>
          {!done?(
            <div style={{...S.cd,marginBottom:14}}>
              <div style={{color:th.sub,fontSize:9,fontWeight:800,letterSpacing:2,marginBottom:11}}>SITUATION {simState.st+1} / {sc.steps.length}</div>
              <div style={{fontWeight:600,fontSize:15,lineHeight:1.7,marginBottom:22}}>{step.sit}</div>
              {simState.dec===null?(
                <div style={{display:"flex",flexDirection:"column",gap:9}}>
                  {step.opts.map((opt,i)=>(
                    <div key={i} style={{background:th.acl,border:`1.5px solid ${th.bdr}`,borderRadius:10,padding:"13px 17px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:11,transition:"border-color .15s"}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor=th.ac}
                      onMouseLeave={e=>e.currentTarget.style.borderColor=th.bdr}
                      onClick={()=>setSimState(s=>({...s,dec:i}))}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:17,color:th.ac,minWidth:26}}>{["A","B"][i]}</span>
                      <span style={{flex:1}}>{opt}</span>
                    </div>
                  ))}
                </div>
              ):(
                <>
                  <div style={{background:simState.dec===step.c?(isCEO?"#F0FFF4":"#0A2A1A"):(isCEO?"#FFF0F0":"#2A0A0A"),border:`2px solid ${simState.dec===step.c?"#36B37E":"#E53935"}`,borderRadius:11,padding:"16px 18px",marginBottom:14}}>
                    <div style={{fontWeight:800,fontSize:15,color:simState.dec===step.c?"#36B37E":"#E53935",marginBottom:7}}>{simState.dec===step.c?"✅ Richtige Entscheidung":"❌ Falsche Entscheidung — Safety Violation"}</div>
                    <div style={{fontSize:12,lineHeight:1.75}}>{step.res[simState.dec]}</div>
                  </div>
                  <button style={{...S.btn(),width:"100%",padding:11,fontSize:13}} onClick={()=>{const ok=simState.dec===step.c;const next=simState.st+1;setSimState(s=>({...s,st:next,dec:null,score:s.score+(ok?1:0),done:next>=sc.steps.length}));}}>
                    {simState.st+1<sc.steps.length?"Weiter →":"Ergebnis →"}
                  </button>
                </>
              )}
            </div>
          ):(
            <div style={{...S.cd,textAlign:"center",padding:38}}>
              <div style={{fontSize:52,marginBottom:14}}>{simState.score===sc.steps.length?"🏆":"📚"}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,color:simState.score===sc.steps.length?"#36B37E":th.ac,marginBottom:9}}>{simState.score}/{sc.steps.length} richtige Entscheidungen</div>
              <div style={{display:"flex",gap:11,justifyContent:"center",flexWrap:"wrap"}}>
                <button style={S.btn()} onClick={()=>setSimState({sc:simState.sc,st:0,dec:null,score:0,done:false})}>🔄 Neu starten</button>
                {simState.sc<SCENARIOS.length-1&&<button style={S.gh} onClick={()=>setSimState({sc:simState.sc+1,st:0,dec:null,score:0,done:false})}>Nächstes Szenario →</button>}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // AI TRAINER
  if(view==="ai"){
    const send=async()=>{
      if(!aiIn.trim()||aiLoad)return;
      const um={r:"u",t:aiIn};
      const newMsgs=[...aiMsgs,um];
      setAiMsgs(newMsgs);setAiIn("");setAiLoad(true);
      const apiMsgs=newMsgs.filter(m=>!(m.r==="a"&&m===aiMsgs[0])).map(m=>({role:m.r==="u"?"user":"assistant",content:m.t}));
      const reply=await callAI(apiMsgs);
      setAiMsgs(p=>[...p,{r:"a",t:reply}]);setAiLoad(false);
    };
    const msgRef=useRef(null);
    useEffect(()=>{msgRef.current?.scrollTo(0,msgRef.current.scrollHeight);},[aiMsgs,aiLoad]);
    return(
      <div style={S.app}><Hdr/>
        <div style={{...S.pg,maxWidth:700,display:"flex",flexDirection:"column"}}>
          <div style={{...S.H2,marginBottom:6}}>🤖 AI AVIATION TRAINER</div>
          <div style={{color:th.sub,fontSize:12,marginBottom:16}}>Gestützt auf Claude AI · Antwortet auf Deutsch und Englisch</div>
          <div style={{...S.cd,display:"flex",flexDirection:"column",flex:1}}>
            <div ref={msgRef} style={{height:380,overflowY:"auto",display:"flex",flexDirection:"column",gap:13,paddingBottom:8}}>
              {aiMsgs.map((msg,i)=>(
                <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",...(msg.r==="u"?{flexDirection:"row-reverse"}:{})}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:msg.r==="u"?th.ac:th.acl,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{msg.r==="u"?"👤":"🤖"}</div>
                  <div style={{maxWidth:"80%",background:msg.r==="u"?th.ac:th.sur,color:msg.r==="u"?th.acfg:th.txt,borderRadius:11,padding:"11px 15px",fontSize:13,lineHeight:1.75,border:msg.r==="u"?"none":`1px solid ${th.bdr}`}}>{msg.t}</div>
                </div>
              ))}
              {aiLoad&&<div style={{display:"flex",gap:10}}><div style={{width:32,height:32,borderRadius:"50%",background:th.acl,display:"flex",alignItems:"center",justifyContent:"center"}}>🤖</div><div style={{background:th.sur,border:`1px solid ${th.bdr}`,borderRadius:11,padding:"11px 15px",color:th.sub,fontSize:13}}>Trainer denkt... ⏳</div></div>}
            </div>
            <div style={{borderTop:`1px solid ${th.bdr}`,paddingTop:13,display:"flex",gap:9,marginTop:13}}>
              <input style={{...S.inp,flex:1}} placeholder="Frage zur Rampensicherheit, Gefahrgut..." value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
              <button style={{...S.btn(),padding:"11px 16px",flexShrink:0}} onClick={send} disabled={aiLoad}>Senden ↗</button>
            </div>
            <div style={{display:"flex",gap:6,marginTop:9,flexWrap:"wrap"}}>
              {["Was ist FOD?","Mindestabstand Triebwerk?","IATA DGR Klassen?","Was ist SMS?"].map(q=>(
                <button key={q} style={{...S.gh,fontSize:10,padding:"4px 9px"}} onClick={()=>setAiIn(q)}>{q}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // PROFILE
  if(view==="profile")return(
    <div style={S.app}><Hdr/>
      <div style={{...S.pg,maxWidth:700}}>
        <div style={S.H2}>MEIN PROFIL</div>
        <div style={{...S.cd,display:"flex",alignItems:"center",gap:18,marginBottom:16}}>
          <div style={{width:62,height:62,borderRadius:"50%",background:th.acl,border:`2.5px solid ${th.ac}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{isCEO?"👔":"👤"}</div>
          <div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900}}>{user?.name}</div><div style={{color:th.sub,fontSize:12}}>{user?.role} · {user?.company}</div></div>
        </div>
        <div style={{...S.cd,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>💳 Abo-Verwaltung</div>
          {!userSubs.length?<div style={{textAlign:"center",padding:"18px 0",color:th.sub}}><div style={{fontSize:30,marginBottom:9}}>📭</div><div>Keine Abonnements</div><button style={{...S.btn(),marginTop:14,fontSize:12}} onClick={()=>nav("dash")}>Zu den Modulen</button></div>:(
            <div style={{display:"flex",flexDirection:"column",gap:11}}>
              {userSubs.map(sub=>{
                const act=sub.status==="active"&&new Date(sub.effEnd)>new Date();
                const canc=sub.status==="cancelled";
                return(
                  <div key={sub.id} style={{background:th.acl,borderRadius:10,padding:"13px 15px",border:`1px solid ${act?"#36B37E":canc?"#E53935":th.bdr}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:9}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{sub.mname}</div>
                        <div style={{color:th.sub,fontSize:11,lineHeight:1.7}}>{SUB_NAMES[sub.plan]} · €{sub.price}/Nutzer/Mon. · Endet: <strong>{fmtDate(sub.effEnd)}</strong></div>
                        <div style={{display:"flex",gap:7,marginTop:7}}><span style={{background:act?"#36B37E22":"#E5393522",color:act?"#36B37E":"#E53935",fontSize:9,fontWeight:800,padding:"2px 9px",borderRadius:20}}>{act?"✅ Aktiv":canc?"🔴 Gekündigt":"⏰"}</span></div>
                      </div>
                      {act&&!canc&&<button style={{background:"transparent",border:"1.5px solid #E53935",color:"#E53935",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:10,fontWeight:700}} onClick={()=>{setCancelTarget(sub);nav("cancel");}}>🗑 Kündigen</button>}
                      {!act&&<button style={{...S.btn(),fontSize:10,padding:"5px 10px"}} onClick={()=>{setActiveMod(MODS.find(m=>m.id===sub.mid));nav("mod-detail");}}>🔄 Verlängern</button>}
                    </div>
                    {canc&&<div style={{marginTop:9,fontSize:10,color:"#E53935"}}>⚠ Gekündigt — Zugang bis {fmtDate(sub.effEnd)}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div style={{...S.cd,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📊 Lernfortschritt</div>
          {MODS.filter(m=>isUnlocked(m.id)).map(mod=>{
            const p=getProgress(mod.id);
            return<div key={mod.id} style={{marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span>{mod.icon} {mod.title}</span><span style={{color:th.ac,fontWeight:700}}>{p}%</span></div>
              <div style={{background:th.bdr,borderRadius:4,height:5,overflow:"hidden"}}><div style={{height:5,borderRadius:4,width:`${p}%`,background:p===100?"#36B37E":th.ac,transition:"width .5s"}}/></div>
            </div>;
          })}
          {!MODS.filter(m=>isUnlocked(m.id)).length&&<div style={{color:th.sub,fontSize:12}}>Noch keine Module abonniert.</div>}
        </div>
      </div>
    </div>
  );

  // CERTIFICATE
  if(view==="cert"){
    const mod=certMod||MODS[2];
    const cid=`CLS-${mod.code}-${Date.now().toString(36).toUpperCase().slice(-6)}`;
    const iss=new Date().toLocaleDateString("de-AT");
    const val=new Date(Date.now()+365*24*60*60*1000).toLocaleDateString("de-AT");
    return(
      <div style={S.app}><Hdr/>
        <div style={{...S.pg,maxWidth:740}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:9}}>
            <button style={{...S.gh,fontSize:12}} onClick={()=>nav("profile")}>← Zurück</button>
            <button style={{...S.btn("#36B37E"),fontSize:12}} onClick={()=>window.print()}>🖨 Drucken / PDF</button>
          </div>
          <div style={{background:"#FFF",borderRadius:14,overflow:"hidden",boxShadow:"0 8px 44px rgba(0,0,0,.32)",fontFamily:"'DM Sans',sans-serif",color:"#1A1A1A"}}>
            <div style={{height:9,background:`linear-gradient(90deg,${th.ac},${th.ac}88,#36B37E)`}}/>
            <div style={{padding:"40px 48px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:32,flexWrap:"wrap",gap:11}}>
                <div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:21,letterSpacing:5,color:th.ac}}>CLEAR LEADERSHIP SYSTEMS</div><div style={{fontSize:10,letterSpacing:3,color:"#999",fontWeight:600}}>AVIATION COMPLIANCE TRAINING</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#AAA",letterSpacing:1}}>ZERTIFIKAT-ID</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,color:th.ac}}>{cid}</div></div>
              </div>
              <div style={{textAlign:"center",marginBottom:32}}>
                <div style={{fontSize:10,letterSpacing:4,color:"#AAA",fontWeight:700,marginBottom:9}}>ZERTIFIKAT</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:"clamp(26px,5vw,48px)",fontWeight:900,letterSpacing:2,color:"#181818",marginBottom:9}}>{user?.name||"Max Mustermann"}</div>
                <div style={{width:70,height:2,background:th.ac,margin:"0 auto 18px"}}/>
                <div style={{fontSize:14,color:"#555",lineHeight:1.7}}>hat das Modul erfolgreich abgeschlossen</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:"#181818",marginTop:11}}>{mod.code} — {mod.title}</div>
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:11,flexWrap:"wrap",marginBottom:32}}>
                {[mod.cat,"Aviation","IATA Compliant"].map(tag=><div key={tag} style={{background:`${th.ac}11`,border:`1px solid ${th.ac}44`,borderRadius:20,padding:"5px 16px",fontSize:11,fontWeight:700,color:th.ac}}>{tag}</div>)}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",borderTop:"1.5px solid #E5E5E5",paddingTop:22,flexWrap:"wrap",gap:13}}>
                <div><div style={{fontSize:9,color:"#AAA",letterSpacing:1,marginBottom:3}}>AUSGESTELLT AM</div><div style={{fontWeight:700,fontSize:13}}>{iss}</div><div style={{fontSize:9,color:"#AAA",letterSpacing:1,marginTop:7,marginBottom:3}}>GÜLTIG BIS</div><div style={{fontWeight:700,fontSize:13}}>{val}</div></div>
                <div style={{textAlign:"center"}}><div style={{width:84,height:84,border:`2.5px solid ${th.ac}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",background:`${th.ac}08`}}><span style={{fontSize:24}}>✈</span><span style={{fontSize:7,letterSpacing:1.5,color:th.ac,fontWeight:900}}>CERTIFIED</span></div></div>
                <div style={{textAlign:"right"}}><div style={{width:130,borderBottom:"1.5px solid #333",marginBottom:5}}/><div style={{fontSize:10,color:"#888"}}>Stephan Gruber</div><div style={{fontSize:9,color:"#AAA"}}>CEO, Clear Leadership Systems</div><div style={{fontSize:9,color:"#AAA",marginTop:2}}>clear-leadership-systems.com</div></div>
              </div>
            </div>
            <div style={{height:5,background:`linear-gradient(90deg,#36B37E,${th.ac})`}}/>
          </div>
        </div>
      </div>
    );
  }

  // ANALYTICS (CEO)
  if(view==="analytics")return(
    <div style={S.app}><Hdr/>
      <div style={S.pg}>
        <div style={{...S.H2,marginBottom:6}}>ANALYTICS DASHBOARD</div>
        <div style={{color:th.sub,fontSize:12,marginBottom:24}}>Letzte 12 Monate · Echtzeit-Übersicht</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:13,marginBottom:26}}>
          {[{icon:"💰",v:"€109.2k",l:"Umsatz",d:"+23%",up:true},{icon:"👥",v:"420",l:"Nutzer",d:"+18%",up:true},{icon:"🎯",v:"74%",l:"Abschlussrate",d:"+5%",up:true},{icon:"🔑",v:subs.length+38,l:"Lizenzen",d:`+${subs.length}`,up:true}].map(k=>(
            <div key={k.l} style={S.cd}>
              <div style={{fontSize:20,marginBottom:7}}>{k.icon}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:th.ac,lineHeight:1}}>{k.v}</div>
              <div style={{color:th.sub,fontSize:10,fontWeight:700,letterSpacing:1,marginTop:3}}>{k.l.toUpperCase()}</div>
              <div style={{marginTop:7,fontSize:11,fontWeight:700,color:k.up?"#36B37E":"#E53935"}}>{k.d} {k.up?"▲":"▼"}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:15,marginBottom:15}}>
          <div style={S.cd}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>Monatsumsatz</div>
            <ResponsiveContainer width="100%" height={190}><BarChart data={REV}><CartesianGrid strokeDasharray="3 3" stroke={th.bdr}/><XAxis dataKey="m" tick={{fill:th.sub,fontSize:9}} axisLine={false} tickLine={false}/><YAxis tick={{fill:th.sub,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>`€${v/1000}k`}/><Tooltip contentStyle={{background:th.sur,border:`1px solid ${th.bdr}`,borderRadius:8,color:th.txt}} formatter={v=>[`€${v}`,""]} /><Bar dataKey="v" fill={th.ac} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>
          </div>
          <div style={S.cd}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>Modulverteilung</div>
            <ResponsiveContainer width="100%" height={190}><PieChart><Pie data={PIE} cx="50%" cy="50%" outerRadius={72} dataKey="value" label={({percent})=>`${(percent*100).toFixed(0)}%`} labelLine={false}>{PIE.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip contentStyle={{background:th.sur,border:`1px solid ${th.bdr}`,borderRadius:8,color:th.txt}}/></PieChart></ResponsiveContainer>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px 12px",marginTop:9}}>{PIE.map(m=><div key={m.name} style={{display:"flex",alignItems:"center",gap:4,fontSize:9}}><div style={{width:7,height:7,borderRadius:2,background:m.color}}/><span style={{color:th.sub}}>{m.name}</span></div>)}</div>
          </div>
        </div>
      </div>
    </div>
  );

  // HELP
  if(view==="help"){
    const cats=[{k:"tech",icon:"⚙",l:"Technisches Problem",sol:"Cache leeren (Strg+Shift+R). Bei Problemen Ticket senden."},{k:"billing",icon:"💳",l:"Zahlungsproblem",sol:"Zahlungsmethode unter Profil prüfen. Erstattungen in 5-7 Werktagen."},{k:"access",icon:"🔑",l:"Zugriffsproblem",sol:"'Passwort vergessen' nutzen. Konto nach 5 Fehlversuchen 30 Min. gesperrt."},{k:"cert",icon:"📜",l:"Zertifikat",sol:"Zertifikate nach Prüfungsbestehen automatisch generiert."},{k:"other",icon:"💬",l:"Sonstiges",sol:"Ticket senden. Reaktionszeit: 4 Stunden."}];
    return(
      <div style={S.app}><Hdr/>
        <div style={S.pg}>
          <div style={S.H2}>HILFE & SUPPORT</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:11,marginBottom:20}}>
            {cats.map(cat=><div key={cat.k} style={{...S.cd,cursor:"pointer",border:helpCat?.k===cat.k?`2px solid ${th.ac}`:`1px solid ${th.bdr}`,background:helpCat?.k===cat.k?th.acl:th.sur,transition:"transform .15s"}} onClick={()=>setHelpCat(cat)} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform=""}><div style={{fontSize:28,marginBottom:9}}>{cat.icon}</div><div style={{fontWeight:700,fontSize:12}}>{cat.l}</div></div>)}
          </div>
          {helpCat&&<div style={{...S.cd,marginBottom:20,borderLeft:`3px solid ${th.ac}`}}><div style={{color:th.ac,fontSize:9,fontWeight:800,letterSpacing:2,marginBottom:7}}>LÖSUNG</div><div style={{fontSize:13,lineHeight:1.8}}>{helpCat.sol}</div></div>}
          <div style={S.cd}>
            <div style={{...S.H2,marginBottom:14}}>TICKET SENDEN</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",gap:11,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 150px"}}><label style={S.lbl}>NAME</label><input style={S.inp} placeholder="Max Mustermann"/></div>
                <div style={{flex:"1 1 190px"}}><label style={S.lbl}>E-MAIL</label><input style={S.inp} type="email" placeholder="email@airline.com"/></div>
              </div>
              <div><label style={S.lbl}>NACHRICHT</label><textarea style={{...S.inp,height:75,resize:"vertical"}}/></div>
              <button style={{...S.btn(),alignSelf:"flex-start",padding:"10px 22px"}}>Absenden ↗</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return<div style={S.app}><Hdr/><div style={{...S.pg,textAlign:"center",paddingTop:70,color:th.sub,fontSize:32}}>🔄</div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
